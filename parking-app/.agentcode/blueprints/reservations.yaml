model: Reservation
slug: reservations
table: reservations

options:
  belongs_to_organization: false
  soft_deletes: false
  audit_trail: false
  pagination: true
  per_page: 25

columns:
  start_time:
    type: datetime
    nullable: false
    filterable: true
    sortable: true
  end_time:
    type: datetime
    nullable: false
    filterable: true
    sortable: true
  status:
    type: string
    default: "pending"
    filterable: true
  total_cost:
    type: decimal
    nullable: true
    precision: 10
    scale: 2
  notes:
    type: text
    nullable: true
  vehicle_id:
    type: foreignId
    foreign_model: Vehicle
    index: true
    filterable: true
  parking_spot_id:
    type: foreignId
    foreign_model: ParkingSpot
    index: true
    filterable: true
  user_id:
    type: foreignId
    foreign_model: User
    index: true

relationships:
  - type: belongsTo
    model: Vehicle
  - type: belongsTo
    model: ParkingSpot
  - type: belongsTo
    model: User

permissions:
  admin:
    actions: [index, show, store, update, destroy]
    show_fields: "*"
    create_fields: "*"
    update_fields: "*"
  manager:
    actions: [index, show, store, update]
    show_fields: "*"
    create_fields: [start_time, end_time, status, total_cost, notes, vehicle_id, parking_spot_id, user_id]
    update_fields: [start_time, end_time, status, total_cost, notes, vehicle_id, parking_spot_id, user_id]
  member:
    actions: [index, show, store]
    show_fields: "*"
    create_fields: [start_time, end_time, status, total_cost, notes, vehicle_id, parking_spot_id, user_id]
    update_fields: []

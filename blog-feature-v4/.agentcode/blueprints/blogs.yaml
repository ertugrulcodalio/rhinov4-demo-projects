model: Blog
slug: blogs
table: blogs

options:
  belongs_to_organization: true

columns:
  title:
    type: string
    nullable: false
  body:
    type: text
    nullable: true
  published:
    type: boolean
    default: false

relationships:
  - type: belongsTo
    model: Organization

permissions:
  admin:
    actions: [index, show, store, update, destroy]
    show_fields: "*"
    create_fields: "*"
    update_fields: "*"
  user:
    actions: [index, show]
    show_fields: "*"
    create_fields: []
    update_fields: []
